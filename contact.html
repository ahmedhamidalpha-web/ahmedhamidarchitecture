<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="header-pro"><div class="container"><a href="index.html" class="logo-pro"><img src="assets/logo.png"><div class="logo-text"><span>Ahmed Hamid</span><span>Architecture</span></div></a><nav class="nav-pro"><a href="index.html">الرئيسية</a><a href="contact.html" class="active">تواصل</a></nav></div></header>

    <section class="page-head"><div class="container"><h1>تواصل معنا</h1></div></section>

    <section class="section"><div class="container contact-grid">
        <div class="card"><h3>معلوماتنا</h3><p>📧 ahmedhamidarchitecture@gmail.com</p><p>📍 امدرمان, السودان</p></div>
        <div class="card">
            <h3>اطلب مشروع</h3>
            <form id="clientRequestForm">
                <input id="clientName" type="text" placeholder="الاسم *" required>
                <input id="clientEmail" type="email" placeholder="الايميل *" required>
                <input id="clientPhone" type="tel" placeholder="الهاتف *" required>
                <textarea id="clientDetails" placeholder="تفاصيل المشروع *" rows="5" required></textarea>
                <button type="submit" class="btn-primary" id="submitBtn">ارسال</button>
                <p id="formStatus"></p>
            </form>
        </div>
    </div></section>
    <script src="./script.js"></script>
</body>
</html>
