<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Admin Dashboard | Ahmed Hamid Architecture
</title>


<link rel="icon" href="../assets/logo.png">


<link rel="stylesheet" href="../style.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


<!-- Chart Library -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


</head>



<body class="admin-body">





<header class="admin-header">


<div class="container">


<a href="../index.html"
class="admin-logo">


<img src="../assets/logo.png">


<span>
Ahmed Hamid Architecture
</span>


</a>





<button id="logout-btn"
class="admin-logout">


Logout

</button>



</div>


</header>









<section class="admin-dashboard">


<div class="container">





<h1>

Dashboard

</h1>


<p>

Manage your architecture studio website.

</p>









<!-- QUICK STATS -->


<div class="dashboard-cards">





<div class="dashboard-card">


<i class="fa-solid fa-building"></i>


<h3>

Projects

</h3>


<span id="projects-count">

0

</span>


</div>








<div class="dashboard-card">


<i class="fa-solid fa-newspaper"></i>


<h3>

Posts

</h3>


<span id="posts-count">

0

</span>


</div>








<div class="dashboard-card">


<i class="fa-solid fa-comments"></i>


<h3>

Comments

</h3>


<span id="comments-count">

0

</span>


</div>








<div class="dashboard-card">


<i class="fa-solid fa-users"></i>


<h3>

Visitors

</h3>


<span id="visitors-count">

--

</span>


</div>





</div>









<!-- ANALYTICS -->


<div class="admin-box analytics-box">



<h2>

Website Analytics

</h2>



<p>

Visitor statistics from Google Analytics

</p>






<div class="chart-container">


<canvas id="visitorChart">

</canvas>


</div>





</div>









<!-- MANAGEMENT -->


<div class="dashboard-actions">






<a href="add-project.html"
class="admin-action">


<i class="fa-solid fa-plus"></i>


Add Project


</a>








<a href="edit-project.html"
class="admin-action">


<i class="fa-solid fa-pen"></i>


Edit Projects


</a>








<a href="posts.html"
class="admin-action">


<i class="fa-solid fa-file"></i>


Manage Posts


</a>








<a href="../projects.html"
class="admin-action"
target="_blank">


<i class="fa-solid fa-eye"></i>


View Website


</a>






</div>








</div>


</section>









<script src="../script.js"></script>


</body>

</html>
