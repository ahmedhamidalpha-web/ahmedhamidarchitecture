<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Ahmed Hamid Architecture</title>
    <link rel="icon" href="../assets/logo.png">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body class="admin-login-body">

    <div class="admin-login-box">
        <img src="../assets/logo.png" class="admin-login-logo" alt="Ahmed Hamid Architecture">
        <h1>Admin Login</h1>
        <p>Ahmed Hamid Architecture Dashboard</p>

        <form id="login-form">
            <div class="form-group">
                <label for="admin-email">Email</label>
                <input type="email" id="admin-email" placeholder="Enter admin email" required>
            </div>

            <div class="form-group password-group" style="position: relative;">
                <label for="admin-password">Password</label>
                <input type="password" id="admin-password" placeholder="Enter password" required style="width: 100%; padding-right: 40px;">
                <i class="fa-regular fa-eye" id="toggle-password" style="position: absolute; right: 15px; top: 38px; cursor: pointer; color: #777;"></i>
            </div>

            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-right-to-bracket"></i> Login
            </button>

            <p id="login-message"></p>
        </form>
    </div>

    <script>
        // كود تشغيل وإخفاء الباسورد
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('admin-password');

        togglePassword.addEventListener('click', function () {
            // تبديل نوع الحقل بين password و text
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // تبديل الأيقونة بين العين المفتوحة والمغلقة
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // كود معالجة تسجيل الدخول
        document.getElementById("login-form").addEventListener("submit", function(e) {
            e.preventDefault();

            const email = document.getElementById("admin-email").value.trim();
            const password = document.getElementById("admin-password").value;
            const messageElement = document.getElementById("login-message");

            // تنظيف الكلاسات السابقة
            messageElement.className = ""; 

            // فحص البيانات (تعديل الإيميل والباسورد التجريبي هنا)
            if (email === "admin@email.com" && password === "Password") {
                localStorage.setItem("admin", "true");
                
                messageElement.textContent = "Login Successful!";
                messageElement.classList.add("success"); // كلاس للنجاح (أخضر مثلاً)

                setTimeout(function() {
                    window.location.href = "dashboard.html";
                }, 700);
            } else {
                messageElement.textContent = "Wrong Email Or Password";
                messageElement.classList.add("error"); // كلاس للخطأ (أحمر مثلاً)
            }
        });
    </script>
</body>
</html>
