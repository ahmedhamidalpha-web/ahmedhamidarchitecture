<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Admin Login | Ahmed Hamid Architecture
</title>


<link rel="icon" href="../assets/logo.png">


<link rel="stylesheet" href="../style.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


</head>


<body class="admin-login-body">



<div class="admin-login-box">



<img src="../assets/logo.png"
class="admin-login-logo"
alt="Ahmed Hamid Architecture">





<h1>
Admin Login
</h1>


<p>
Ahmed Hamid Architecture Dashboard
</p>







<form id="login-form">



<div class="form-group">


<label>
Email
</label>



<input
type="email"
id="admin-email"
placeholder="Enter admin email"
required>


</div>







<div class="form-group">


<label>
Password
</label>



<input
type="password"
id="admin-password"
placeholder="Enter password"
required>


</div>







<button
type="submit"
class="btn btn-primary">


<i class="fa-solid fa-right-to-bracket"></i>

Login


</button>





<p id="login-message"></p>




</form>






</div>






<script>


document
.getElementById("login-form")
.addEventListener(
"submit",
function(e){


e.preventDefault();




let email =
document.getElementById(
"admin-email"
).value;



let password =
document.getElementById(
"admin-password"
).value;






if(
email === "admin@email.com"
&&
password === "Password"
){



localStorage.setItem(
"admin",
"true"
);



document.getElementById(
"login-message"
).innerHTML =
"Login Successful";




setTimeout(
function(){


window.location.href =
"dashboard.html";


},
700
);




}

else{


document.getElementById(
"login-message"
).innerHTML =
"Wrong Email Or Password";



}



});



</script>



</body>

</html>
