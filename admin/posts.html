<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Posts Management | Admin
</title>


<link rel="icon" href="../assets/logo.png">


<link rel="stylesheet" href="../style.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


</head>


<body class="admin-body">





<header class="admin-header">


<div class="container">


<a href="dashboard.html"
class="admin-logo">


<img src="../assets/logo.png">


<span>
Ahmed Hamid Architecture
</span>


</a>





<a href="dashboard.html">


<i class="fa-solid fa-arrow-left"></i>

Dashboard


</a>



</div>


</header>









<section class="admin-section">


<div class="container admin-grid">





<!-- ADD POST -->

<div class="admin-box">


<h1>

Create New Post

</h1>



<form id="post-form">






<div class="form-group">


<label>
Title
</label>


<input
type="text"
id="post-title"
placeholder="Post title"
required>


</div>








<div class="form-group">


<label>
Post Type
</label>


<select id="post-type">


<option value="article">

Article

</option>


<option value="news">

News

</option>


<option value="announcement">

Announcement

</option>


<option value="career">

Career Opportunity

</option>


<option value="training">

Training

</option>


</select>


</div>









<div class="form-group">


<label>
Content
</label>


<textarea
id="post-content"
rows="10"
placeholder="Write your post..."
required>

</textarea>


</div>









<div class="form-group">


<label>
Post Image
</label>


<input
type="file"
id="post-image"
accept="image/*">


</div>









<button
class="btn btn-primary"
type="submit">


Publish Post


</button>





<p id="post-message"></p>



</form>


</div>










<!-- POSTS LIST -->



<div class="admin-box">


<h2>

Published Posts

</h2>





<div id="posts-list">


</div>





</div>








</div>


</section>









<script src="../script.js"></script>


</body>

</html>
