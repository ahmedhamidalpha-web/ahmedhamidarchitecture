<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts Management | Admin</title>
    <link rel="icon" href="../assets/logo.png">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body class="admin-body">

    <header class="admin-header">
        <div class="container">
            <a href="dashboard.html" class="admin-logo">
                <img src="../assets/logo.png" alt="Logo">
                <span>Ahmed Hamid Architecture</span>
            </a>
            <a href="dashboard.html" class="back-link">
                <i class="fa-solid fa-arrow-left"></i> Dashboard
            </a>
        </div>
    </header>

    <section class="admin-section">
        <div class="container admin-grid" style="display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 40px; align-items: start;">
            
            <div class="admin-box">
                <h1>Create New Post</h1>
                <p style="margin-bottom: 20px; color: #4a473e;">Publish articles, news, or announcements to your studio blog.</p>
                
                <form id="post-form">
                    <div class="form-group">
                        <label for="post-title">Title</label>
                        <input type="text" id="post-title" placeholder="Post title" required>
                    </div>

                    <div class="form-group">
                        <label for="post-type">Post Type</label>
                        <select id="post-type" required>
                            <option value="article">Article</option>
                            <option value="news">News</option>
                            <option value="announcement">Announcement</option>
                            <option value="career">Career Opportunity</option>
                            <option value="training">Training</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="post-content">Content</label>
                        <textarea id="post-content" rows="10" placeholder="Write your post..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="post-image">Post Image</label>
                        <input type="file" id="post-image" accept="image/*">
                    </div>

                    <button class="btn btn-primary" type="submit" style="width: 100%;">Publish Post</button>
                    <p id="post-message" style="margin-top: 15px; text-align: center; font-weight: 500;"></p>
                </form>
            </div>

            <div class="admin-box">
                <h2>Published Posts</h2>
                <p style="margin-bottom: 20px; color: #4a473e;">Review and manage active blog posts.</p>
                <div id="posts-list" style="display: flex; flex-direction: column; gap: 20px; max-height: 700px; overflow-y: auto; padding-right: 10px;">
                    </div>
            </div>

        </div>
    </section>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // 1. جدار الحماية: التحقق من تسجيل الدخول
            if (localStorage.getItem("admin") !== "true") {
                window.location.href = "login.html";
                return;
            }

            let posts = JSON.parse(localStorage.getItem("architect_posts")) || [];
            
            const postForm = document.getElementById("post-form");
            const messageElement = document.getElementById("post-message");
            const postsListContainer = document.getElementById("posts-list");

            // 2. دالة عرض قائمة المنشورات الحالية مع زر الحذف
            function renderPostsList() {
                postsListContainer.innerHTML = "";

                if (posts.length === 0) {
                    postsListContainer.innerHTML = `
                        <div style="text-align: center; padding: 40px; color: #888; border: 1px dashed var(--line-light); border-radius: 4px;">
                            <i class="fa-solid fa-folder-open" style="font-size: 30px; margin-bottom: 10px; display: block;"></i>
                            No posts found. Publish your first post!
                        </div>`;
                    return;
                }

                posts.forEach(post => {
                    const postCard = document.createElement("div");
                    postCard.style.cssText = "background: var(--paper-2); border: 1px solid var(--line-light); padding: 18px; border-radius: 4px; position: relative;";
                    
                    // تحضير كود الصورة إن وجدت
                    const imgHtml = post.image ? `<img src="${post.image}" style="width:100%; height:120px; object-fit:cover; border-radius:4px; margin-bottom:12px;">` : '';

                    // وضع لون ونوع التاغ بشكل مميز
                    const badgeStyles = "display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; text-transform: uppercase; margin-bottom: 8px;";
                    const typeBadge = `<span style="${badgeStyles} background: var(--gold-dim); color: #fff;">${post.type}</span>`;

                    postCard.innerHTML = `
                        ${imgHtml}
                        ${typeBadge}
                        <h4 style="font-size: 16px; margin: 5px 0; color: var(--ink);">${post.title}</h4>
                        <p style="font-size: 13px; color: #5a5748; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 12px;">${post.content}</p>
                        <div style="display:flex; justify-content: space-between; align-items:center; font-size:11px; color:#888;">
                            <span>Published on: ${new Date(post.date).toLocaleDateString()}</span>
                            <button class="delete-post-btn" data-id="${post.id}" style="background: #e71d36; color: white; border: none; border-radius: 4px; padding: 4px 10px; cursor: pointer;">
                                <i class="fa-solid fa-trash"></i> Delete
                            </button>
                        </div>
                    `;
                    postsListContainer.appendChild(postCard);
                });

                // ربط أحداث الحذف بالأزرار
                attachDeleteEventListeners();
            }

            // 3. دالة ربط أزرار الحذف
            function attachDeleteEventListeners() {
                document.querySelectorAll(".delete-post-btn").forEach(btn => {
                    btn.addEventListener("click", function() {
                        const id = this.getAttribute("data-id");
                        if (confirm("Are you sure you want to delete this post permanently?")) {
                            posts = posts.filter(p => p.id !== id);
                            localStorage.setItem("architect_posts", JSON.stringify(posts));
                            renderPostsList();
                        }
                    });
                });
            }

            // 4. دالة مساعدة لتحويل الصورة إلى Base64
            function convertImageToBase64(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = error => reject(error);
                    reader.readAsDataURL(file);
                });
            }

            // 5. معالجة إرسال النموذج ونشر المقال الجديد
            postForm.addEventListener("submit", async function (e) {
                e.preventDefault();
                messageElement.className = "";
                messageElement.textContent = "Publishing post...";

                try {
                    const fileInput = document.getElementById("post-image");
                    let base64Image = "";

                    // تحويل الصورة إذا كانت مرفوعة
                    if (fileInput && fileInput.files.length > 0) {
                        base64Image = await convertImageToBase64(fileInput.files[0]);
                    }

                    // بناء كائن المقال الجديد
                    const newPost = {
                        id: "post_" + Date.now(),
                        title: document.getElementById("post-title").value.trim(),
                        type: document.getElementById("post-type").value,
                        content: document.getElementById("post-content").value.trim(),
                        image: base64Image, // حفظ الصورة المشفرة محلياً
                        date: new Date().toISOString()
                    };

                    // إدراج المنشور الجديد في أول المصفوفة لعرض الأحدث أولاً
                    posts.unshift(newPost);
                    localStorage.setItem("architect_posts", JSON.stringify(posts));

                    messageElement.textContent = "Post published successfully!";
                    messageElement.className = "success"; // تنسيق النجاح بالأخضر

                    // تنظيف الحقول وتحديث القائمة الفورية
                    postForm.reset();
                    renderPostsList();

                    setTimeout(() => {
                        messageElement.textContent = "";
                    }, 2000);

                } catch (error) {
                    console.error("Error publishing post:", error);
                    messageElement.textContent = "An error occurred. Please try again.";
                    messageElement.className = "error"; // تنسيق الخطأ بالأحمر
                }
            });

            // التشغيل الأولي وعرض المنشورات المخزنة
            renderPostsList();
        });
    </script>
</body>
</html>
