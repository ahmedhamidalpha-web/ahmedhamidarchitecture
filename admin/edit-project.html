<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Edit Projects | Ahmed Hamid Architecture</title>


<link rel="icon" href="../assets/logo.png">

<link rel="stylesheet" href="../style.css">


<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


</head>



<body class="admin-page">





<header class="admin-header">

<div class="admin-container">


<div class="admin-brand">


<img src="../assets/logo.png">


<h2>

Ahmed Hamid Architecture

</h2>


</div>




<a href="dashboard.html"
class="admin-back">

<i class="fa-solid fa-arrow-left"></i>

Dashboard

</a>



</div>

</header>









<main class="admin-dashboard">


<div class="admin-container">






<div class="admin-form-box">



<div class="form-title">


<h1>

Manage Projects

</h1>


<p>

Edit existing projects or remove them from the website.

Images stored in Google Drive will not be deleted.

</p>


</div>









<!-- SEARCH -->


<div class="form-group">


<label>

Search Project

</label>


<input

type="search"

id="project-search"

placeholder="Search by project name...">


</div>








<!-- PROJECT LIST -->


<div id="admin-projects-list"

class="admin-projects-list">



<!--

Projects will load here from Supabase

Example:


<div class="admin-project-card">

Image

Title

Edit button

Delete button

</div>


-->



</div>







</div>








<!-- EDIT AREA -->



<div class="admin-form-box"

id="edit-project-box"

style="display:none;">



<h2>

Edit Project

</h2>





<form id="edit-project-form">





<input

type="hidden"

id="edit-project-id">









<div class="form-group">


<label>

Project Title

</label>


<input

type="text"

id="edit-title"

required>


</div>









<div class="form-group">


<label>

Category

</label>


<select id="edit-category">


<option value="residential">

Residential

</option>


<option value="commercial">

Commercial

</option>


<option value="interior">

Interior

</option>


<option value="planning">

Planning

</option>


</select>


</div>









<div class="form-group">


<label>

Location

</label>


<input

type="text"

id="edit-location">


</div>









<div class="form-group">


<label>

Date

</label>


<input

type="date"

id="edit-date">


</div>








<div class="form-group">


<label>

Description

</label>


<textarea

id="edit-description"

rows="7"></textarea>


</div>









<button

class="btn btn-primary"

type="submit">


Save Changes


</button>





<button

type="button"

id="cancel-edit"

class="btn btn-outline">


Cancel


</button>






</form>



</div>







</div>


</main>









<script>


// This page will be connected later
// with Supabase database


const editBox =
document.getElementById("edit-project-box");


document
.getElementById("cancel-edit")
.onclick=function(){


editBox.style.display="none";


};




</script>





</body>

</html>
