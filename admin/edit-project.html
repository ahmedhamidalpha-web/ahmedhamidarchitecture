<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Edit Project | Admin
</title>


<link rel="icon" href="../assets/logo.png">


<link rel="stylesheet" href="../style.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


</head>



<body class="admin-body">



<header class="admin-header">

<div class="container">


<a href="dashboard.html"
class="admin-logo">


<img src="../assets/logo.png">

<span>
Ahmed Hamid Architecture
</span>


</a>



<a href="dashboard.html">

<i class="fa-solid fa-arrow-left"></i>

Dashboard

</a>



</div>

</header>








<section class="admin-section">


<div class="container">


<div class="admin-box">


<h1>

Edit Project

</h1>



<form id="edit-project-form">





<input
type="hidden"
id="edit-project-id">









<div class="form-group">


<label>
Project Title
</label>


<input
type="text"
id="edit-title"
required>


</div>









<div class="form-group">


<label>
Category
</label>


<select id="edit-category">


<option value="residential">
Residential
</option>


<option value="commercial">
Commercial
</option>


<option value="interior">
Interior
</option>


<option value="planning">
Planning
</option>


</select>


</div>









<div class="form-group">


<label>
Location
</label>


<input
type="text"
id="edit-location">


</div>









<div class="form-group">


<label>
Plot Area
</label>


<input
type="text"
id="edit-area">


</div>









<div class="form-group">


<label>
Components
</label>


<textarea
id="edit-components">

</textarea>


</div>









<div class="form-group">


<label>
Design Concept
</label>


<textarea
id="edit-description"
required>

</textarea>


</div>









<div class="form-group">


<label>
Challenges
</label>


<textarea
id="edit-challenges">

</textarea>


</div>









<div class="form-group">


<label>
Result
</label>


<textarea
id="edit-result">

</textarea>


</div>









<div class="form-group">


<label>
Add New Images (Optional)
</label>


<input
type="file"
id="edit-images"
multiple
accept="image/*">


</div>









<div id="current-images"
class="admin-images">

</div>









<button
type="submit"
class="btn btn-primary">


Save Changes


</button>






<p id="edit-message"></p>





</form>





</div>


</div>


</section>









<script src="../script.js"></script>


</body>


</html>
